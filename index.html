<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dokumenten-Verknüpfer</title>
<script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1f2933;
    --muted: #6b7682;
    --line: #e1e6ea;
    --accent: #1c5d99;
    --accent-fg: #ffffff;
    --ok: #1f7a4d;
    --warn: #9a6700;
    --field: #f4f6f8;
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1b1f23; --fg: #e6eaed; --muted: #9aa4ad; --line: #2c333a;
      --accent: #4a9fe0; --field: #23292f;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--fg);
    font: 15px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 16px; }
  header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  header h1 { font-size: 17px; margin: 0; font-weight: 650; }
  header .sub { color: var(--muted); font-size: 13px; }
  .card {
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px; background: var(--bg);
  }
  .row { margin-bottom: 12px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
  input[type=text], select {
    width: 100%; padding: 11px 12px; font-size: 15px;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--field); color: var(--fg);
  }
  button {
    font: inherit; font-weight: 600; cursor: pointer;
    border: 1px solid transparent; border-radius: 8px;
    padding: 12px 16px; min-height: 46px; /* tablet-tauglich */
  }
  button.primary { background: var(--accent); color: var(--accent-fg); width: 100%; }
  button.ghost { background: transparent; border-color: var(--line); color: var(--fg); }
  button.iconbtn { background: transparent; border: 1px solid var(--line); color: var(--fg); width: 42px; min-height: 42px; padding: 0; font-size: 19px; border-radius: 8px; flex: 0 0 auto; }
  button:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
  .result-name { font-weight: 650; word-break: break-word; }
  .badge { display:inline-block; font-size:12px; padding:2px 8px; border-radius:999px; background:var(--field); color:var(--muted); }
  .key { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .hint { color: var(--muted); font-size: 13px; }
  .ok { color: var(--ok); }
  .warn { color: var(--warn); }
  .empty { text-align:center; color: var(--muted); padding: 28px 8px; }
  .stack > * + * { margin-top: 10px; }
  .hidden { display: none !important; }
  .spinner { width:18px;height:18px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;display:inline-block;vertical-align:-3px;animation:spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
  .combo { position: relative; }
  .combo-results {
    position: absolute; left: 0; right: 0; top: calc(100% + 4px); z-index: 30;
    max-height: 300px; overflow-y: auto;
    background: var(--bg); border: 1px solid var(--line); border-radius: 8px;
    box-shadow: 0 8px 28px rgba(0,0,0,.16);
  }
  .combo-group { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); padding: 9px 12px 3px; position: sticky; top: 0; background: var(--bg); }
  .combo-item { padding: 10px 12px; cursor: pointer; }
  .combo-item:hover { background: var(--field); }
  .combo-item .val { color: var(--muted); font-size: 12px; }
  .combo-empty { padding: 14px 12px; color: var(--muted); font-size: 13px; }
  .linkbtn { background: none; border: 0; color: var(--accent); padding: 0; min-height: 0; font-size: 13px; font-weight: 600; cursor: pointer; }
  .picked { padding: 11px 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--field); font-size: 14px; word-break: break-word; }
  .browser { position: fixed; inset: 0; background: var(--bg); z-index: 50; display: flex; flex-direction: column; padding: 16px; }
  .browser-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .fb-crumb { flex: 1; font-size: 13px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fb-list { flex: 1; overflow-y: auto; border: 1px solid var(--line); border-radius: 8px; margin-bottom: 12px; }
  .fb-folder { display: flex; align-items: center; gap: 8px; padding: 13px 12px; cursor: pointer; border-top: 1px solid var(--line); }
  .fb-folder:first-child { border-top: 0; }
  .fb-folder:hover { background: var(--field); }
  .fb-empty { padding: 14px 12px; color: var(--muted); font-size: 13px; }
  .filelist { display: flex; flex-direction: column; }
  .filerow { display: block; padding: 11px 2px; border-top: 1px solid var(--line); color: var(--accent); text-decoration: none; word-break: break-word; }
  .filerow:first-child { border-top: 0; }
  .filerow:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="icon.svg" width="22" height="22" alt="" />
    <div style="flex:1">
      <h1>Dokumenten-Verknüpfer</h1>
      <div class="sub" id="proj-sub">verbinde…</div>
    </div>
    <button class="iconbtn" id="btn-settings" title="Einstellungen" aria-label="Einstellungen">⚙</button>
  </header>

  <!-- LAUFZEIT-ANSICHT -->
  <section id="view-runtime">
    <div class="card">
      <button class="primary" id="btn-lookup">Aktualisieren</button>
      <p class="hint" style="margin:10px 0 0">
        Nichts gewählt zeigt alle Listen. Bauteil im Modell wählen filtert auf dessen Liste.
      </p>
    </div>
    <div id="runtime-out"></div>
  </section>

  <!-- KONFIG-ANSICHT -->
  <section id="view-config" class="hidden">
    <button class="ghost" id="btn-back" style="margin-bottom:12px">← Zurück</button>
    <div class="card stack">
      <div class="row">
        <label for="cfg-attr-search">1. Schlüssel-Attribut
          <button class="linkbtn" id="btn-attr-reload" type="button" style="float:right">↻ aus Auswahl neu laden</button>
        </label>
        <div class="combo">
          <input type="text" id="cfg-attr-search" autocomplete="off"
                 placeholder="Name eingeben, z. B. Stahllistennummer" />
          <div id="cfg-attr-results" class="combo-results hidden"></div>
        </div>
        <p class="hint" id="attr-hint">Bauteil im Modell wählen, dann hier tippen, um zu filtern.</p>
      </div>
      <div class="row">
        <label>2. Ordner mit den Listen</label>
        <div id="folder-display" class="picked">— kein Ordner gewählt —</div>
        <button class="ghost" id="btn-pick-folder" type="button" style="margin-top:8px">Ordner wählen…</button>
      </div>
      <div class="row">
        <label for="cfg-match">3. Abgleich</label>
        <select id="cfg-match">
          <option value="exact">Dateiname = Attributwert (ohne Endung)</option>
          <option value="contains">Dateiname enthält Attributwert</option>
        </select>
      </div>
      <button class="primary" id="btn-save">Speichern</button>
      <p class="hint" id="save-hint"></p>
    </div>

    <!-- ORDNER-BROWSER (Overlay) -->
    <div id="folder-browser" class="browser hidden">
      <div class="browser-head">
        <button class="linkbtn" id="fb-up" type="button">↑ zurück</button>
        <span id="fb-crumb" class="fb-crumb"></span>
        <button class="iconbtn" id="fb-close" type="button" style="width:36px;min-height:36px;font-size:16px">✕</button>
      </div>
      <div id="fb-list" class="fb-list"></div>
      <button class="primary" id="fb-choose" type="button">Diesen Ordner wählen</button>
    </div>
  </section>
</div>

<script>
"use strict";

const App = {
  api: null,
  token: null,
  projectId: null,
  config: null,        // { projectId, rules: [ {pset, attribute, targetFolderId, matchMode} ] }
  view: "runtime",
  attrChoices: [],     // zwischengespeicherte Attribute des gewählten Bauteils
  selectedAttr: null,  // { pset, attribute }
  fileIndex: null,     // gecachte, flache Dateiliste des Zielordners
  fileIndexFolder: null,
  _indexPromise: null,
  selectedFolderId: null,
  selectedFolderName: "",
};

const $ = (id) => document.getElementById(id);

// ---------- Start ----------
(async function init() {
  try {
    App.api = await TrimbleConnectWorkspace.connect(window.parent, onEvent, 30000);
  } catch (e) {
    $("proj-sub").textContent = "Verbindung zu Trimble fehlgeschlagen.";
    return;
  }

  // Linkes Menü setzen
  try {
    App.api.ui.setMenu({
      title: "Doku-Verknüpfer",
      icon: location.origin + "/icon.svg",
      command: "doclink_main",
      subMenus: [],
    });
  } catch (_) {}

  // Projektkontext
  try {
    const proj = await App.api.project.getCurrentProject();
    App.projectId = proj && (proj.id || proj.projectId);
    $("proj-sub").textContent = proj ? (proj.name || App.projectId) : "kein Projekt";
  } catch (_) {
    $("proj-sub").textContent = "Projekt nicht lesbar";
  }

  await requestToken();
  await loadConfig();
  bindUI();
  showRuntime();

  // Datei-Index im Hintergrund vorladen -> erster Abruf ist schnell
  if (App.config && App.config.rules[0]) {
    ensureFileIndex(App.config.rules[0].targetFolderId).catch(() => {});
  }
})();

// ---------- Events von Trimble ----------
let selRefreshTimer = null;
function onEvent(event, data) {
  if (event === "extension.command") {
    const cmd = data && data.data;
    if (cmd === "open_config") showConfig();
    else if (cmd === "doclink_main") showRuntime();
  } else if (event === "extension.accessToken") {
    const t = data && data.data;
    if (t && t !== "pending" && t !== "denied") App.token = t;
  } else if (/selection/i.test(event)) {
    // Auswahlwechsel: gewählt -> filtern, nichts gewählt -> alle Listen.
    // Exakter Event-Name variiert je nach Viewer-Version -> lose gematcht + entprellt.
    clearTimeout(selRefreshTimer);
    selRefreshTimer = setTimeout(() => {
      if (App.view === "runtime" && App.config) refreshRuntime();
    }, 120);
  }
}

async function requestToken() {
  try {
    const res = await App.api.extension.requestPermission("accesstoken");
    if (res && res !== "pending" && res !== "denied") App.token = res;
  } catch (_) { /* Token kommt sonst per Event */ }
}

// ---------- Konfiguration laden/speichern ----------
async function loadConfig() {
  if (!App.projectId) return;
  try {
    const r = await fetch("/api/config/" + encodeURIComponent(App.projectId));
    if (r.ok) {
      const j = await r.json();
      App.config = (j && j.rules && j.rules.length) ? j : null;
    }
  } catch (_) {}
}

async function saveConfig(rule) {
  const payload = { projectId: App.projectId, rules: [rule] };
  const r = await fetch("/api/config/" + encodeURIComponent(App.projectId), {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  if (!r.ok) throw new Error("Speichern fehlgeschlagen (" + r.status + ")");
  App.config = payload;
}

// ---------- Laufzeit ----------
// Entscheidet: Auswahl vorhanden -> filtern; nichts gewählt -> alle Listen.
async function refreshRuntime() {
  if (!App.config) { $("runtime-out").innerHTML = card(notConfigured()); return; }
  let sel = null;
  try { sel = await App.api.viewer.getSelection(); } catch (_) {}
  if (sel && sel.length && sel[0].objectRuntimeIds && sel[0].objectRuntimeIds.length) {
    lookupSelected(sel);
  } else {
    showAllLists();
  }
}

// Alle Listen des konfigurierten Ordners (Übersicht, wenn nichts gewählt ist)
async function showAllLists() {
  const out = $("runtime-out");
  if (!App.config) { out.innerHTML = card(notConfigured()); return; }
  out.innerHTML = card('<span class="spinner"></span> &nbsp;Lade Listen…');
  try {
    const files = await ensureFileIndex(App.config.rules[0].targetFolderId);
    if (!files.length) { out.innerHTML = card('<div class="empty">Keine Listen im Ordner.</div>'); return; }
    const sorted = files.slice().sort((a, b) => String(a.name).localeCompare(String(b.name)));
    let html = '<div class="badge">' + sorted.length + " Listen</div>"
      + '<p class="hint" style="margin:8px 0 12px">Bauteil im Modell wählen, um auf dessen Liste zu filtern.</p>'
      + '<div class="filelist">';
    for (const f of sorted) {
      html += '<a class="filerow" href="' + esc(open2DUrl(f.id)) + '" target="_blank" rel="noopener">'
        + esc(f.name) + "</a>";
    }
    html += "</div>";
    out.innerHTML = card(html);
  } catch (e) {
    out.innerHTML = card('<div class="warn">Listen nicht ladbar: ' + esc(e.message || e) + "</div>");
  }
}

// Genau eine Liste zum gewählten Bauteil
async function lookupSelected(sel) {
  const out = $("runtime-out");
  out.innerHTML = card('<span class="spinner"></span> &nbsp;Suche Liste…');
  try {
    if (!sel) sel = await App.api.viewer.getSelection();
    if (!sel || !sel.length || !sel[0].objectRuntimeIds || !sel[0].objectRuntimeIds.length) {
      return showAllLists();
    }
    const rule = App.config.rules[0];
    const props = await App.api.viewer.getObjectProperties(sel[0].modelId, [sel[0].objectRuntimeIds[0]]);
    const key = extractValue(props, rule.pset, rule.attribute);

    if (!key) {
      out.innerHTML = card('<div class="warn">Kein Schlüssel im Attribut <b>'
        + esc(rule.pset) + " › " + esc(rule.attribute) + "</b> an diesem Bauteil.</div>" + backLink());
      return;
    }
    const file = await findFile(rule.targetFolderId, key, rule.matchMode);
    if (!file) {
      out.innerHTML = card('<div class="warn">Keine Liste zu Schlüssel '
        + '<span class="key">' + esc(key) + "</span> gefunden.</div>" + backLink());
      return;
    }
    showResult(key, file);
  } catch (e) {
    out.innerHTML = card('<div class="warn">Fehler: ' + esc(e.message || String(e)) + "</div>");
  }
}

function open2DUrl(fileId) {
  // 2D-Viewer-Link (PDF/Zeichnungen). Der data/files-Pfad öffnet nur ein leeres Fenster.
  const fid = encodeURIComponent(fileId);
  return "https://web.connect.trimble.com/projects/" + App.projectId
    + "/viewer/2D?id=" + fid + "&version=" + fid + "&type=revisions&etag=" + fid;
}

function backLink() {
  return '<button class="ghost js-all" type="button" style="width:100%;margin-top:12px">← Alle Listen</button>';
}

function notConfigured() {
  return '<div class="empty">Noch nicht konfiguriert.<br>'
    + '<span class="hint">Oben rechts auf ⚙ tippen, um die Verknüpfung einzurichten.</span></div>';
}

function showResult(key, file) {
  $("runtime-out").innerHTML = card(
      '<div class="badge">Schlüssel <span class="key">' + esc(key) + "</span></div>"
    + '<div class="result-name" style="margin:8px 0">' + esc(file.name) + "</div>"
    + '<a href="' + esc(open2DUrl(file.id)) + '" target="_blank" rel="noopener">'
    + '<button class="primary">Dokument öffnen</button></a>'
    + backLink()
  );
}

// Defensiver Durchlauf durch die ObjectProperties-Struktur
function extractValue(propsArray, psetName, attrName) {
  for (const obj of propsArray || []) {
    const sets = obj.properties || obj.propertySets || [];
    for (const set of sets) {
      if (psetName && set.name !== psetName) continue;
      const list = set.properties || [];
      for (const p of list) {
        if (p.name === attrName && p.value != null && String(p.value).trim() !== "") {
          return String(p.value).trim();
        }
      }
    }
  }
  return "";
}

// Lädt die (rekursive) Dateiliste des Ordners EINMAL und cached sie.
async function ensureFileIndex(folderId, force) {
  if (force || App.fileIndexFolder !== folderId) {
    App.fileIndex = null;
    App.fileIndexFolder = folderId;
    App._indexPromise = null;
  }
  if (App.fileIndex) return App.fileIndex;
  if (!App._indexPromise) {
    App._indexPromise = (async () => {
      const r = await fetch("/api/files?folderId=" + encodeURIComponent(folderId), {
        headers: { Authorization: "Bearer " + (App.token || "") },
      });
      if (!r.ok) throw new Error("Ordner nicht lesbar (" + r.status + ")");
      const items = await r.json();
      App.fileIndex = (items || []).filter((i) => i.type !== "FOLDER");
      return App.fileIndex;
    })();
  }
  try { return await App._indexPromise; }
  finally { App._indexPromise = null; }
}

function matchInIndex(files, key, matchMode) {
  const n = (s) => String(s || "").toLowerCase();
  const stripExt = (s) => String(s || "").replace(/\.[^.]+$/, "");
  if (matchMode === "contains") return files.find((f) => n(f.name).includes(n(key)));
  return files.find((f) => n(stripExt(f.name)) === n(key))
      || files.find((f) => n(f.name).includes(n(key)));
}

async function findFile(folderId, key, matchMode) {
  let files = await ensureFileIndex(folderId);
  let hit = matchInIndex(files, key, matchMode);
  if (!hit) {
    // evtl. neu hinzugekommene Datei -> Index einmal frisch laden und nochmal suchen
    files = await ensureFileIndex(folderId, true);
    hit = matchInIndex(files, key, matchMode);
  }
  return hit;
}

// ---------- Konfig-Ansicht: durchsuchbare Attribut-Auswahl ----------
// Lädt die Attribute des gewählten Bauteils EINMAL und cached sie.
async function loadAttributeChoices(force) {
  if (App.attrChoices.length && !force) return;
  const hint = $("attr-hint");
  hint.textContent = "lese Auswahl…";
  try {
    const sel = await App.api.viewer.getSelection();
    if (!sel || !sel.length || !sel[0].objectRuntimeIds || !sel[0].objectRuntimeIds.length) {
      hint.textContent = "Kein Bauteil ausgewählt — eines im Modell antippen, dann ↻.";
      return;
    }
    const props = await App.api.viewer.getObjectProperties(
      sel[0].modelId, [sel[0].objectRuntimeIds[0]]);
    const choices = [];
    for (const obj of props || []) {
      for (const set of (obj.properties || obj.propertySets || [])) {
        for (const p of (set.properties || [])) {
          choices.push({ pset: set.name, attr: p.name, value: p.value });
        }
      }
    }
    App.attrChoices = choices;
    hint.textContent = choices.length + " Attribute geladen — tippen zum Filtern.";
    const box = $("cfg-attr-results");
    if (box && !box.classList.contains("hidden")) renderAttrResults($("cfg-attr-search").value);
  } catch (e) {
    hint.textContent = "Fehler: " + (e.message || e);
  }
}

// Filtert die gecachten Attribute live und zeigt sie nach Pset gruppiert.
function renderAttrResults(filter) {
  const box = $("cfg-attr-results");
  const f = String(filter || "").toLowerCase().trim();
  if (!App.attrChoices.length) {
    box.innerHTML = '<div class="combo-empty">Kein Bauteil geladen. Bauteil im Modell wählen, dann ↻.</div>';
    box.classList.remove("hidden");
    return;
  }
  const matches = App.attrChoices.filter((c) =>
    !f || c.attr.toLowerCase().includes(f) || c.pset.toLowerCase().includes(f));
  if (!matches.length) {
    box.innerHTML = '<div class="combo-empty">Keine Treffer.</div>';
    box.classList.remove("hidden");
    return;
  }
  const groups = {};
  for (const m of matches.slice(0, 80)) (groups[m.pset] = groups[m.pset] || []).push(m);
  let html = "";
  for (const pset of Object.keys(groups)) {
    html += '<div class="combo-group">' + esc(pset) + "</div>";
    for (const m of groups[pset]) {
      const val = m.value != null ? String(m.value) : "";
      html += '<div class="combo-item" data-pset="' + esc(m.pset) + '" data-attr="' + esc(m.attr) + '">'
        + esc(m.attr)
        + (val ? ' <span class="val">· ' + esc(val.slice(0, 32)) + "</span>" : "")
        + "</div>";
    }
  }
  box.innerHTML = html;
  box.classList.remove("hidden");
  box.querySelectorAll(".combo-item").forEach((el) => {
    el.addEventListener("mousedown", (e) => {
      e.preventDefault(); // vor dem blur des Inputs feuern
      App.selectedAttr = { pset: el.getAttribute("data-pset"), attribute: el.getAttribute("data-attr") };
      $("cfg-attr-search").value = App.selectedAttr.pset + " › " + App.selectedAttr.attribute;
      box.classList.add("hidden");
    });
  });
}

async function onSave() {
  const sh = $("save-hint");
  const folder = App.selectedFolderId;
  if (!App.selectedAttr) { sh.textContent = "Bitte ein Attribut wählen."; sh.className = "hint warn"; return; }
  if (!folder) { sh.textContent = "Bitte einen Ordner wählen."; sh.className = "hint warn"; return; }
  const rule = {
    pset: App.selectedAttr.pset,
    attribute: App.selectedAttr.attribute,
    targetFolderId: folder,
    targetFolderName: App.selectedFolderName || "",
    matchMode: $("cfg-match").value,
  };
  try {
    await saveConfig(rule);
    sh.textContent = "Gespeichert.";
    sh.className = "hint ok";
    // Index für den (ggf. neuen) Ordner im Hintergrund aufbauen
    ensureFileIndex(folder, true).catch(() => {});
  } catch (e) {
    sh.textContent = e.message;
    sh.className = "hint warn";
  }
}

// ---------- Ordner-Browser ----------
let fbStack = []; // [{id, name}], letztes Element = aktueller Ordner
const FOLDER_ICON = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" '
  + 'stroke-width="2" style="vertical-align:-3px;opacity:.6;flex:0 0 auto"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';

async function fbFetch(qs) {
  const r = await fetch("/api/browse?" + qs, { headers: { Authorization: "Bearer " + (App.token || "") } });
  if (!r.ok) throw new Error("(" + r.status + ")");
  return r.json();
}

async function openFolderBrowser() {
  $("folder-browser").classList.remove("hidden");
  $("fb-list").innerHTML = '<div class="fb-empty">lädt…</div>';
  try {
    const data = await fbFetch("projectId=" + encodeURIComponent(App.projectId));
    fbStack = [{ id: data.folderId, name: "Projekt" }];
    renderFb(data.folders);
  } catch (e) {
    $("fb-list").innerHTML = '<div class="fb-empty warn">Ordner nicht lesbar ' + esc(e.message || e) + "</div>";
  }
}

async function fbReload() {
  $("fb-list").innerHTML = '<div class="fb-empty">lädt…</div>';
  try {
    const data = await fbFetch("folderId=" + encodeURIComponent(fbStack[fbStack.length - 1].id));
    renderFb(data.folders);
  } catch (e) {
    $("fb-list").innerHTML = '<div class="fb-empty warn">Fehler ' + esc(e.message || e) + "</div>";
  }
}

function renderFb(folders) {
  $("fb-crumb").textContent = fbStack.map((s) => s.name).join(" / ");
  const list = $("fb-list");
  folders = folders || [];
  if (!folders.length) {
    list.innerHTML = '<div class="fb-empty">Keine Unterordner. Mit „Diesen Ordner wählen" bestätigen.</div>';
    return;
  }
  list.innerHTML = "";
  folders.forEach((f) => {
    const el = document.createElement("div");
    el.className = "fb-folder";
    el.innerHTML = FOLDER_ICON + " <span>" + esc(f.name) + "</span>";
    el.addEventListener("click", () => { fbStack.push({ id: f.id, name: f.name }); fbReload(); });
    list.appendChild(el);
  });
}

function fbUp() { if (fbStack.length > 1) { fbStack.pop(); fbReload(); } }
function fbClose() { $("folder-browser").classList.add("hidden"); }
function fbChoose() {
  const cur = fbStack[fbStack.length - 1];
  App.selectedFolderId = cur.id;
  App.selectedFolderName = fbStack.map((s) => s.name).join(" / ");
  $("folder-display").textContent = App.selectedFolderName;
  fbClose();
}

// ---------- Ansicht wechseln ----------
function showRuntime() {
  App.view = "runtime";
  $("view-runtime").classList.remove("hidden");
  $("view-config").classList.add("hidden");
  refreshRuntime();
}

function showConfig() {
  App.view = "config";
  $("view-config").classList.remove("hidden");
  $("view-runtime").classList.add("hidden");
  if (App.config && App.config.rules[0]) {
    const r = App.config.rules[0];
    App.selectedFolderId = r.targetFolderId || null;
    App.selectedFolderName = r.targetFolderName || r.targetFolderId || "";
    $("folder-display").textContent = App.selectedFolderName || "— kein Ordner gewählt —";
    $("cfg-match").value = r.matchMode || "exact";
    App.selectedAttr = { pset: r.pset, attribute: r.attribute };
    $("cfg-attr-search").value = r.pset + " › " + r.attribute;
  }
  // Attribute vorab im Hintergrund laden -> Filtern reagiert danach sofort
  loadAttributeChoices();
}

function bindUI() {
  $("btn-lookup").addEventListener("click", refreshRuntime);
  $("btn-save").addEventListener("click", onSave);
  $("btn-settings").addEventListener("click", showConfig);
  $("btn-back").addEventListener("click", showRuntime);

  // Klick auf „← Alle Listen" (per Delegation, da Inhalt dynamisch ist)
  $("runtime-out").addEventListener("click", (e) => {
    if (e.target.closest(".js-all")) showAllLists();
  });

  const searchEl = $("cfg-attr-search");
  let t;
  searchEl.addEventListener("focus", async () => {
    if (!App.attrChoices.length) await loadAttributeChoices();
    renderAttrResults(searchEl.value);
  });
  searchEl.addEventListener("input", () => {
    clearTimeout(t);
    t = setTimeout(() => renderAttrResults(searchEl.value), 100);
  });
  searchEl.addEventListener("blur", () => {
    setTimeout(() => $("cfg-attr-results").classList.add("hidden"), 150);
  });
  $("btn-attr-reload").addEventListener("click", async () => {
    await loadAttributeChoices(true);
    renderAttrResults(searchEl.value);
  });

  $("btn-pick-folder").addEventListener("click", openFolderBrowser);
  $("fb-up").addEventListener("click", fbUp);
  $("fb-close").addEventListener("click", fbClose);
  $("fb-choose").addEventListener("click", fbChoose);
}

// ---------- Helfer ----------
function card(inner) { return '<div class="card">' + inner + "</div>"; }
function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
</script>
